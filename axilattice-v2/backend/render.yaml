services:
  - type: web
    name: axilattice-backend-v2
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DUCKDB_PATH
        value: /opt/render/project/data/axilattice.duckdb
      - key: AXL_SQLITE_PATH
        value: /opt/render/project/data/axl_meta.db
    disk:
      name: cube-data
      mountPath: /opt/render/project/data
      sizeGB: 5
